<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protect Democracy – Subversion Strategy</title>
<link href="https://use.typekit.net/mko1zsi.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #000C48;
    --cream: #FBF6ED;
    --blue: #324DB6;
    --red: #E4382A;
    --lead: #2E2D31;
  }
  body {
    background: #ffffff;
    font-family: 'halyard-text', sans-serif;
    display: flex; flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px 40px;
  }
 @media (max-width: 768px) {
  body {
    min-height: unset;
  }
}
  .diagram-wrap {
    position: relative;
    width: min(600px, 100%);
  }
  svg.main-svg { width: 100%; overflow: visible; display: block; }
  .anim-el { opacity: 0; }

  /* Tooltip rendered as HTML over the SVG */
  #tt {
    display: none;
    position: absolute;
    background: #fff;
    color: #000C48;
    font-family: 'halyard-text', sans-serif;
    font-size: 12px;
    line-height: 1.6;
    padding: 10px 13px;
    width: 190px;
    box-shadow: 0 0 10px 4px rgba(0,0,0,0.15);
    pointer-events: none;
    z-index: 999;
  }
  #tt.show { display: block; }

  .hz {
    position: absolute;
    cursor: pointer;
    background: transparent;
  }

  .replay-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: 'halyard-text', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s;
  }
  .replay-btn:hover { background: var(--blue); }
</style>
</head>
<body>

<div class="diagram-wrap" id="diagramWrap">
  <div id="tt"></div>

  <div class="hz" id="hz1" data-tip="1"></div>
  <div class="hz" id="hz2" data-tip="2"></div>
  <div class="hz" id="hz3" data-tip="3"></div>
  <div class="hz" id="hz4" data-tip="4"></div>
  <div class="hz" id="hz5" data-tip="5"></div>

<svg class="main-svg" id="mainSvg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-navy" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#000C48"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- STEP 1 -->
  <g class="anim-el" id="anim-step1">
    <circle cx="300" cy="370" r="310" fill="none" stroke="#E4382A" stroke-width="1.5" stroke-dasharray="2 5"/>
    <circle cx="300" cy="370" r="298" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="10" filter="url(#shadow)"/>
    <circle cx="300" cy="370" r="298" fill="#fbf6ed" stroke="none"/>
    <text x="300" y="55" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" letter-spacing=".13em" fill="#E4382A">DECEIVE</text>
    <circle cx="300" cy="94" r="12" fill="#E4382A"/>
    <text x="300" y="99" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
    <text x="300" y="128" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#000C48">Supercharge</text>
    <text x="300" y="145" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#000C48">conspiracies</text>
  </g>

  <!-- RING BASE -->
  <g class="anim-el" id="anim-ring-base">
    <circle cx="300" cy="370" r="196" fill="none" stroke="#E4382A" stroke-width="1.5" stroke-dasharray="2 5"/>
    <text x="300" y="166" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" letter-spacing=".13em" fill="#E4382A">DISRUPT</text>
    <path fill-rule="evenodd" fill="#000C48"
      d="M300,370 m-184,0 a184,184 0 1,0 368,0 a184,184 0 1,0 -368,0
         M300,370 m-84,0  a84,84   0 1,1 168,0 a84,84   0 1,1 -168,0"/>
    <line x1="300" y1="454" x2="300" y2="554" stroke="#ffffff" stroke-width="7"/>
    <line x1="227.3" y1="328" x2="140.6" y2="278" stroke="#ffffff" stroke-width="7"/>
    <line x1="372.7" y1="328" x2="459.4" y2="278" stroke="#ffffff" stroke-width="7"/>
    <circle cx="300" cy="370" r="84" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="10" filter="url(#shadow)"/>
    <circle cx="300" cy="370" r="84" fill="#ffffff"/>
  </g>

  <!-- TACTIC 2 -->
  <g class="anim-el" id="anim-step2">
    <path fill="#000C48" d="M 144.8,271.1 A 184,184 0 0,1 455.2,271.1 L 370.8,324.9 A 84,84 0 0,0 229.2,324.9 Z"/>
    <circle cx="300" cy="215" r="12" fill="#E4382A"/>
    <text x="300" y="220" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
    <text x="300" y="248" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">Deploy federal</text>
    <text x="300" y="265" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">power</text>
  </g>

  <!-- TACTIC 3 -->
  <g class="anim-el" id="anim-step3">
    <path fill="#000C48" d="M 292.0,553.8 A 184,184 0 0,1 136.8,285.1 L 225.5,331.2 A 84,84 0 0,0 296.3,453.9 Z"/>
    <circle cx="175" cy="405" r="12" fill="#E4382A"/>
    <text x="175" y="410" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>
    <text x="175" y="438" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">Use</text>
    <text x="180" y="455" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">violence</text>
  </g>

  <!-- TACTIC 4 -->
  <g class="anim-el" id="anim-step4">
    <path fill="#000C48" d="M 463.2,285.1 A 184,184 0 0,1 308.0,553.8 L 303.7,453.9 A 84,84 0 0,0 374.5,331.2 Z"/>
    <circle cx="420" cy="405" r="12" fill="#E4382A"/>
    <text x="420" y="410" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="13" font-weight="700" fill="#fff">4</text>
    <text x="415" y="438" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">Manipulate</text>
    <text x="415" y="455" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">election rules</text>
  </g>

  <!-- CENTER TEXT + ARROW -->
  <g class="anim-el" id="anim-center-text">
    <text x="300" y="346" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" fill="#E4382A" letter-spacing=".03em">THESE ACTIONS ALL</text>
    <text x="300" y="359" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" fill="#E4382A" letter-spacing=".03em">UNDERMINE VOTER</text>
    <text x="300" y="372" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" fill="#E4382A" letter-spacing=".03em">PARTICIPATION</text>
    <text x="300" y="391" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" fill="#000C48" letter-spacing=".06em">AND IF THAT'S</text>
    <text x="300" y="404" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" fill="#000C48" letter-spacing=".06em">NOT ENOUGH...</text>
    <line x1="300" y1="428" x2="300" y2="600" stroke="#000C48" stroke-width="1.5" marker-end="url(#arr-navy)"/>
  </g>

  <!-- STEP 5 -->
  <g class="anim-el" id="anim-step5">
    <circle cx="300" cy="700" r="72" fill="none" stroke="#E4382A" stroke-width="1.5" stroke-dasharray="2 5"/>
    <text x="300" y="623" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="10" font-weight="700" letter-spacing=".13em" fill="#E4382A">DENY</text>
    <circle cx="300" cy="700" r="60" fill="#000C48"/>
    <circle cx="300" cy="673" r="12" fill="#E4382A"/>
    <text x="300" y="678" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="13" font-weight="700" fill="#fff">5</text>
    <text x="300" y="711" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">Overturn</text>
    <text x="300" y="728" text-anchor="middle" font-family="halyard-text,sans-serif" font-size="14" font-weight="600" fill="#fff">results</text>
  </g>
</svg>
</div>

<button class="replay-btn" id="replayBtn" onclick="runAnimation()"><span style="font-size:22px; font-weight:300;">↺</span> Replay</button>

<script>
  const tipText = {
    1: "The administration has made election denialism official federal policy by using investigative and enforcement powers to undermine confidence in elections.",
    2: "The administration has used investigative, prosecutorial, and regulatory power to deter opposition, voter engagement, and faithful public service.",
    3: "The administration has used and threatened violence to quash protests and create conditions for voter intimidation.",
    4: "The administration is pursuing a coordinated effort to seize control over election administration and make it harder for millions of eligible Americans to vote.",
    5: "If the administration can't hold on to power by tilting the electoral playing field or making it harder for Americans to vote, they will contest, delay, or overturn results they don't like."
  };

  const tt   = document.getElementById('tt');
  const wrap = document.getElementById('diagramWrap');

  // Position tooltip relative to the diagram-wrap container
  function placeTip(pageX, pageY) {
    const wrapRect = wrap.getBoundingClientRect();
    const scrollY  = window.scrollY || window.pageYOffset;
    const scrollX  = window.scrollX || window.pageXOffset;
    const wrapTop  = wrapRect.top  + scrollY;
    const wrapLeft = wrapRect.left + scrollX;
    const ttW = 190;
    const ttH = 130;
    const wrapW = wrapRect.width;
    const wrapH = wrapRect.height;

    // Convert page coords to coords relative to wrap
    let x = (pageX - wrapLeft) + 16;
    let y = (pageY - wrapTop)  + 16;

    if (x + ttW > wrapW - 8) x = (pageX - wrapLeft) - ttW - 16;
    if (x < 4) x = 4;
    if (y + ttH > wrapH - 8) y = (pageY - wrapTop) - ttH - 16;
    if (y < 4) y = 4;

    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }

  // Hover zones: SVG coords → percent of viewBox
  const zones = {
    hz1: [215, 82,  170, 85],
    hz2: [205, 197, 190, 82],
    hz3: [100, 385, 150, 85],
    hz4: [345, 385, 150, 85],
    hz5: [235, 655, 130, 90],
  };

  function positionZones() {
    for (const [id, [x, y, w, h]] of Object.entries(zones)) {
      const el = document.getElementById(id);
      el.style.left   = (x / 600 * 100) + '%';
      el.style.top    = (y / 800 * 100) + '%';
      el.style.width  = (w / 600 * 100) + '%';
      el.style.height = (h / 800 * 100) + '%';
    }
  }
  positionZones();
  window.addEventListener('resize', positionZones);

  document.querySelectorAll('.hz').forEach(hz => {
    hz.addEventListener('mouseenter', e => {
      tt.textContent = tipText[hz.dataset.tip];
      tt.classList.add('show');
      placeTip(e.pageX, e.pageY);
    });
    hz.addEventListener('mousemove', e => placeTip(e.pageX, e.pageY));
    hz.addEventListener('mouseleave', () => tt.classList.remove('show'));

    hz.addEventListener('touchstart', e => {
      tt.textContent = tipText[hz.dataset.tip];
      tt.classList.add('show');
      placeTip(e.touches[0].pageX, e.touches[0].pageY);
      e.preventDefault();
    }, { passive: false });
    hz.addEventListener('touchmove', e => {
      placeTip(e.touches[0].pageX, e.touches[0].pageY);
      e.preventDefault();
    }, { passive: false });
  });

  document.addEventListener('touchstart', e => {
    if (!e.target.closest('.hz')) tt.classList.remove('show');
  });

  // Animation
  function fadeIn(el, ms) {
    return new Promise(r => {
      el.style.transition = `opacity ${ms}ms ease`;
      el.style.opacity = 1;
      setTimeout(r, ms);
    });
  }
  function resetEl(el) { el.style.transition = 'none'; el.style.opacity = 0; }
  const pause = ms => new Promise(r => setTimeout(r, ms));

  async function runAnimation() {
    const ids = ['anim-step1','anim-ring-base','anim-step2','anim-step3','anim-step4','anim-center-text','anim-step5'];
    ids.forEach(id => resetEl(document.getElementById(id)));
    const btn = document.getElementById('replayBtn');
    btn.disabled = true;

    await pause(300);
    await fadeIn(document.getElementById('anim-step1'), 900);
    await pause(600);
    await fadeIn(document.getElementById('anim-ring-base'), 600);
    await pause(100);
    await fadeIn(document.getElementById('anim-step2'), 300);
    await pause(500);
    await fadeIn(document.getElementById('anim-step3'), 300);
    await pause(500);
    await fadeIn(document.getElementById('anim-step4'), 300);
    await pause(1000);
    await fadeIn(document.getElementById('anim-center-text'), 700);
    await pause(400);
    await fadeIn(document.getElementById('anim-step5'), 900);

    btn.disabled = false;
  }

  window.addEventListener('load', () => setTimeout(runAnimation, 400));
</script>
</body>
</html>
